<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Session — Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --parchment: #f5ead6;
      --ink: #1a1206;
      --ink-light: #3d2e10;
      --gold: #c9973a;
      --gold-dark: #8a6420;
      --blood: #7a1c1c;
      --blood-light: #b02a2a;
      --stone: #d4c8a8;
      --stone-dark: #b0a07a;
      --shadow: rgba(26,18,6,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Text', Georgia, serif;
      background-color: #1a1206;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(90,50,10,0.35) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60,20,10,0.3) 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .scroll {
      background: var(--parchment);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(201,151,58,0.12) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='300' height='300' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      max-width: 480px;
      width: 100%;
      border-radius: 4px;
      box-shadow:
        0 2px 0 var(--gold-dark),
        0 4px 0 rgba(0,0,0,0.3),
        0 8px 30px rgba(0,0,0,0.6),
        inset 0 0 60px rgba(201,151,58,0.08);
      border: 1px solid var(--gold-dark);
      padding: 2.5rem 2rem;
      position: relative;
    }

    .scroll::before, .scroll::after {
      content: '';
      display: block;
      height: 18px;
      background: linear-gradient(to bottom, var(--stone-dark), var(--stone));
      border: 1px solid var(--stone-dark);
      border-radius: 2px;
      margin: 0 -2rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .scroll::before { margin-bottom: 2rem; margin-top: -2.5rem; }
    .scroll::after { margin-top: 2rem; margin-bottom: -2.5rem; }

    .crest {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .crest-symbol {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 0.3rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    .crest h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .crest p {
      font-size: 0.9rem;
      color: var(--ink-light);
      font-style: italic;
      margin-top: 2px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--gold-dark);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    /* NAME INPUT */
    .field-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold-dark);
      display: block;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.35);
      border: 1px solid var(--stone-dark);
      border-bottom: 2px solid var(--gold-dark);
      border-radius: 2px 2px 0 0;
      padding: 8px 12px;
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="text"]:focus {
      background: rgba(255,255,255,0.55);
      border-bottom-color: var(--gold);
    }
    input[type="text"]::placeholder { color: var(--stone-dark); }

    /* RAISE HAND BUTTON */
    .hand-section { margin-top: 1.5rem; }
    .hand-btn {
      width: 100%;
      padding: 1.1rem;
      background: var(--ink);
      color: var(--parchment);
      border: 2px solid var(--gold-dark);
      border-radius: 3px;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.2s;
      box-shadow: 0 3px 0 var(--gold-dark), 0 5px 12px rgba(0,0,0,0.3);
      position: relative;
      top: 0;
    }
    .hand-btn:hover {
      background: var(--ink-light);
      border-color: var(--gold);
      box-shadow: 0 4px 0 var(--gold-dark), 0 6px 16px rgba(0,0,0,0.35);
      top: -1px;
    }
    .hand-btn:active {
      top: 3px;
      box-shadow: 0 0px 0 var(--gold-dark), 0 2px 6px rgba(0,0,0,0.3);
    }
    .hand-btn.raised {
      background: var(--blood);
      border-color: var(--blood-light);
      box-shadow: 0 3px 0 #4a1010, 0 5px 12px rgba(122,28,28,0.4);
    }
    .hand-btn.raised:hover {
      background: var(--blood-light);
      box-shadow: 0 4px 0 #4a1010, 0 6px 20px rgba(122,28,28,0.45);
    }
    .hand-icon { font-size: 1.3rem; transition: transform 0.3s; }
    .hand-btn.raised .hand-icon { transform: translateY(-3px) rotate(-10deg); }

    .status-text {
      text-align: center;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-top: 0.6rem;
      min-height: 1.4rem;
      transition: opacity 0.3s;
    }

    /* POLL SECTION */
    .poll-section { margin-top: 1.5rem; }
    .poll-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .poll-subtitle {
      font-size: 0.88rem;
      font-style: italic;
      color: var(--ink-light);
      margin-bottom: 1rem;
    }

    .vote-btn {
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.3);
      border: 1px solid var(--stone-dark);
      border-left: 3px solid var(--gold-dark);
      border-radius: 2px;
      font-family: 'Crimson Text', serif;
      font-size: 1rem;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s;
    }
    .vote-btn:hover {
      background: rgba(255,255,255,0.6);
      border-left-color: var(--gold);
      transform: translateX(3px);
    }
    .vote-btn.voted {
      background: rgba(201,151,58,0.15);
      border-left-color: var(--gold);
      border-color: var(--gold-dark);
      font-weight: 600;
      cursor: default;
      transform: none;
    }

    /* RESULTS BARS */
    .result-row { margin-bottom: 12px; }
    .result-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--ink-light);
      margin-bottom: 4px;
    }
    .result-label span:first-child { font-weight: 600; color: var(--ink); }
    .bar-track {
      height: 8px;
      background: rgba(0,0,0,0.08);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold-dark), var(--gold));
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .no-poll {
      text-align: center;
      font-style: italic;
      color: var(--ink-light);
      font-size: 0.95rem;
      padding: 1rem 0 0.5rem;
    }

    .voted-badge {
      display: inline-block;
      background: var(--gold-dark);
      color: var(--parchment);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      padding: 2px 8px;
      border-radius: 1px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .connection-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #888;
      margin-right: 5px;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .connection-dot.connected { background: #4a7c3f; box-shadow: 0 0 6px rgba(74,124,63,0.5); }
    .connection-dot.error { background: var(--blood); }

    .footer {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--stone-dark);
      text-align: center;
      font-style: italic;
    }

    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .fade-in { animation: fadeIn 0.35s ease forwards; }

    @keyframes pulse { 0%,100%{box-shadow:0 3px 0 var(--gold-dark),0 5px 12px rgba(0,0,0,0.3)} 50%{box-shadow:0 3px 0 var(--gold-dark),0 5px 20px rgba(201,151,58,0.5)} }
    .hand-btn.raised { animation: pulse 2s infinite; }
  </style>
</head>
<body>

<div class="scroll">
  <div class="crest">
    <span class="crest-symbol">⚔️</span>
    <h1>Session Board</h1>
    <p><span class="connection-dot" id="conn-dot"></span><span id="conn-text">Connecting...</span></p>
  </div>

  <div>
    <label class="field-label" for="player-name">Your Character Name</label>
    <input type="text" id="player-name" placeholder="e.g. Thorin the Bold" maxlength="40" />
  </div>

  <div class="divider">✦</div>

  <div class="hand-section">
    <button class="hand-btn" id="hand-btn" onclick="toggleHand()">
      <span class="hand-icon">✋</span>
      <span id="hand-label">Hail the Dungeon Master</span>
    </button>
    <p class="status-text" id="hand-status"></p>
  </div>

  <div class="divider">✦</div>

  <div class="poll-section" id="poll-section">
    <div class="no-poll" id="no-poll">No decree from the DM yet.<br>Await your fate.</div>
    <div id="poll-content" style="display:none;"></div>
  </div>

  <div class="footer" id="footer-status"></div>
</div>

<!-- ═══════════════════════ FIREBASE ═══════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ┌─────────────────────────────────────────────────┐
  // │  PASTE YOUR FIREBASE CONFIG OBJECT HERE         │
  // └─────────────────────────────────────────────────┘
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY",
    authDomain: "PASTE_YOUR_AUTH_DOMAIN",
    databaseURL: "PASTE_YOUR_DATABASE_URL",
    projectId: "PASTE_YOUR_PROJECT_ID",
    storageBucket: "PASTE_YOUR_STORAGE_BUCKET",
    messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID",
    appId: "PASTE_YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const dot = document.getElementById('conn-dot');
  const connText = document.getElementById('conn-text');

  function setConnected(ok) {
    dot.className = 'connection-dot ' + (ok ? 'connected' : 'error');
    connText.textContent = ok ? 'Connected to session' : 'Connection error';
  }

  // ── Player name ──────────────────────────────────────
  const nameInput = document.getElementById('player-name');
  nameInput.value = localStorage.getItem('dnd_name') || '';
  nameInput.addEventListener('input', () => localStorage.setItem('dnd_name', nameInput.value.trim()));

  function getPlayerName() {
    return nameInput.value.trim() || 'Unknown Adventurer';
  }

  // ── Hand raise ───────────────────────────────────────
  let handRaised = false;
  const handBtn = document.getElementById('hand-btn');
  const handLabel = document.getElementById('hand-label');
  const handStatus = document.getElementById('hand-status');

  window.toggleHand = async function() {
    const name = getPlayerName();
    handRaised = !handRaised;
    const playerKey = name.replace(/[.#$[\]]/g, '_');
    if (handRaised) {
      await set(ref(db, `hands/${playerKey}`), { name, ts: Date.now() });
      handBtn.classList.add('raised');
      handLabel.textContent = 'Lower Your Hand';
      handStatus.textContent = 'The DM has been summoned.';
    } else {
      await set(ref(db, `hands/${playerKey}`), null);
      handBtn.classList.remove('raised');
      handLabel.textContent = 'Hail the Dungeon Master';
      handStatus.textContent = 'Hand lowered.';
      setTimeout(() => { handStatus.textContent = ''; }, 2000);
    }
  };

  // ── Poll listener ─────────────────────────────────────
  let myVote = null;
  const noPoll = document.getElementById('no-poll');
  const pollContent = document.getElementById('poll-content');

  onValue(ref(db, 'poll'), (snap) => {
    setConnected(true);
    const poll = snap.val();
    if (!poll || !poll.active) {
      noPoll.style.display = '';
      pollContent.style.display = 'none';
      pollContent.innerHTML = '';
      myVote = null;
      return;
    }
    noPoll.style.display = 'none';
    pollContent.style.display = '';
    renderPoll(poll);
  }, (err) => { setConnected(false); });

  function renderPoll(poll) {
    if (myVote) {
      renderResults(poll);
      return;
    }
    let html = `<div class="poll-title fade-in">${poll.question}</div>
    <p class="poll-subtitle">Choose your path wisely.</p>`;
    poll.options.forEach(opt => {
      html += `<button class="vote-btn fade-in" onclick="castVote('${opt.replace(/'/g,"\\'")}', this)">${opt}</button>`;
    });
    pollContent.innerHTML = html;
  }

  window.castVote = async function(option, btn) {
    if (myVote) return;
    myVote = option;
    const snap = await get(ref(db, `votes/${option.replace(/[.#$[\]/]/g,'_')}`));
    const current = snap.val() || 0;
    await set(ref(db, `votes/${option.replace(/[.#$[\]/]/g,'_')}`), current + 1);
    // re-fetch poll and show results
    const pSnap = await get(ref(db, 'poll'));
    renderResults(pSnap.val());
  };

  function renderResults(poll) {
    get(ref(db, 'votes')).then(snap => {
      const votes = snap.val() || {};
      const total = Object.values(votes).reduce((a,b)=>a+b,0);
      let html = `<div class="poll-title">${poll.question} <span class="voted-badge">Voted</span></div><br>`;
      poll.options.forEach(opt => {
        const key = opt.replace(/[.#$[\]/]/g,'_');
        const count = votes[key] || 0;
        const pct = total > 0 ? Math.round(count/total*100) : 0;
        html += `<div class="result-row fade-in">
          <div class="result-label"><span>${opt}</span><span>${pct}%</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      });
      html += `<p style="font-size:0.8rem; color:var(--ink-light); font-style:italic; margin-top:6px;">${total} vote${total!==1?'s':''} cast</p>`;
      pollContent.innerHTML = html;
    });
  }

  // live vote updates if already voted
  onValue(ref(db, 'votes'), () => {
    if (!myVote) return;
    get(ref(db, 'poll')).then(s => { if (s.val()?.active) renderResults(s.val()); });
  });

  setConnected(true);
</script>
</body>
</html>
