<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Oracle — Dungeon Master</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- FIREBASE: Replace with your own project config -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

    const firebaseConfig = {
    apiKey: "AIzaSyCJaz5USDV-8LD_fh9nVENJ7JZIIXn8nJA",
    authDomain: "dnd-project-35fcb.firebaseapp.com",
    databaseURL: "https://dnd-project-35fcb-default-rtdb.firebaseio.com",
    projectId: "dnd-project-35fcb",
    storageBucket: "dnd-project-35fcb.firebasestorage.app",
    messagingSenderId: "500467332247",
    appId: "1:500467332247:web:9a87b9f80a61b55bc125d2",
    measurementId: "G-8RSNLY2KM9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ── State ──────────────────────────────────────────────────────
    let pollActive = false;
    let currentOptions = [];
    let optionCount = 2;

    // ── DOM refs ───────────────────────────────────────────────────
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    const totalUsersEl = document.getElementById('total-users');
    const buttonCountEl = document.getElementById('button-count');
    const ratioEl = document.getElementById('ratio');
    const pollStatusEl = document.getElementById('poll-status');
    const pollResultsEl = document.getElementById('poll-results');
    const sendPollBtn = document.getElementById('send-poll-btn');
    const closePollBtn = document.getElementById('close-poll-btn');
    const questionInput = document.getElementById('question-input');
    const optionsContainer = document.getElementById('options-container');
    const addOptionBtn = document.getElementById('add-option-btn');
    const removeOptionBtn = document.getElementById('remove-option-btn');
    const crowdStatsEl = document.getElementById('crowd-stats-section');

    // ── Tab switching ──────────────────────────────────────────────
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active');
      });
    });

    // ── Build option inputs ────────────────────────────────────────
    function renderOptionInputs() {
      optionsContainer.innerHTML = '';
      const labels = ['A', 'B', 'C', 'D'];
      for (let i = 0; i < optionCount; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'option-row';
        wrap.innerHTML = `
          <span class="option-label">${labels[i]}</span>
          <input class="option-input" type="text" placeholder="Option ${labels[i]}..." data-index="${i}" />
        `;
        optionsContainer.appendChild(wrap);
      }
    }

    addOptionBtn.addEventListener('click', () => {
      if (optionCount < 4) { optionCount++; renderOptionInputs(); }
    });
    removeOptionBtn.addEventListener('click', () => {
      if (optionCount > 2) { optionCount--; renderOptionInputs(); }
    });

    renderOptionInputs();

    // ── Send Poll ──────────────────────────────────────────────────
    sendPollBtn.addEventListener('click', async () => {
      const question = questionInput.value.trim();
      const inputs = document.querySelectorAll('.option-input');
      const options = {};
      const labels = ['A', 'B', 'C', 'D'];
      let valid = true;

      inputs.forEach((inp, i) => {
        if (!inp.value.trim()) { valid = false; inp.classList.add('error'); }
        else { inp.classList.remove('error'); options[labels[i]] = inp.value.trim(); }
      });

      if (!question) { questionInput.classList.add('error'); valid = false; }
      else { questionInput.classList.remove('error'); }
      if (!valid) return;

      const votes = {};
      Object.keys(options).forEach(k => votes[k] = 0);

      await update(ref(db), {
        'poll/active': true,
        'poll/question': question,
        'poll/options': options,
        'poll/votes': votes,
        'crowd/button_count': 0
      });

      sendPollBtn.disabled = true;
      closePollBtn.disabled = false;
    });

    // ── Close Poll ─────────────────────────────────────────────────
    closePollBtn.addEventListener('click', async () => {
      await update(ref(db), {
        'poll/active': false,
        'poll/votes': null
      });
      sendPollBtn.disabled = false;
      closePollBtn.disabled = true;
    });

    // ── Listen: crowd ──────────────────────────────────────────────
    onValue(ref(db, 'crowd'), (snap) => {
      const data = snap.val() || {};
      const total = data.total_users || 0;
      const pressed = data.button_count || 0;
      totalUsersEl.textContent = total;
      buttonCountEl.textContent = pressed;
      const pct = total > 0 ? Math.round((pressed / total) * 100) : 0;
      ratioEl.textContent = `${pct}%`;
      ratioEl.style.color = pct > 66 ? '#c0392b' : pct > 33 ? '#e67e22' : '#2ecc71';
    });

    // ── Listen: poll ───────────────────────────────────────────────
    onValue(ref(db, 'poll'), (snap) => {
      const data = snap.val() || {};
      pollActive = data.active || false;

      if (pollActive) {
        pollStatusEl.textContent = '⚔ Poll Active';
        pollStatusEl.className = 'poll-status active';
        sendPollBtn.disabled = true;
        closePollBtn.disabled = false;

        const votes = data.votes || {};
        const options = data.options || {};
        const total = Object.values(votes).reduce((a, b) => a + b, 0);

        pollResultsEl.innerHTML = `
          <div class="result-question">${data.question || ''}</div>
          ${Object.keys(options).map(k => {
            const count = votes[k] || 0;
            const pct = total > 0 ? Math.round((count / total) * 100) : 0;
            return `
              <div class="result-row">
                <div class="result-meta">
                  <span class="result-option-label">${k}</span>
                  <span class="result-option-text">${options[k]}</span>
                  <span class="result-count">${count} votes</span>
                </div>
                <div class="result-bar-bg">
                  <div class="result-bar" style="width:${pct}%"></div>
                </div>
                <span class="result-pct">${pct}%</span>
              </div>`;
          }).join('')}
          <div class="result-total">Total votes: ${total}</div>
        `;
      } else {
        pollStatusEl.textContent = '○ No Active Poll';
        pollStatusEl.className = 'poll-status inactive';
        sendPollBtn.disabled = false;
        closePollBtn.disabled = true;
        pollResultsEl.innerHTML = `<p class="no-poll-msg">No poll is currently active. Create one above.</p>`;
      }
    });

    // ── QR Code ────────────────────────────────────────────────────
    const audienceURL = window.location.href.replace('dm2.html', 'audience.html');
    document.getElementById('audience-url').textContent = audienceURL;
    new QRCode(document.getElementById('qr-code'), {
      text: audienceURL,
      width: 220,
      height: 220,
      colorDark: '#1a0a00',
      colorLight: '#f5e6c8',
      correctLevel: QRCode.CorrectLevel.H
    });

  </script>

  <style>
    :root {
      --parchment: #f5e6c8;
      --parchment-dark: #e8d5a3;
      --ink: #1a0a00;
      --ink-light: #3d1f00;
      --gold: #c9922a;
      --gold-bright: #f0b429;
      --crimson: #8b1a1a;
      --crimson-bright: #c0392b;
      --stone: #2a2318;
      --stone-mid: #3d3326;
      --stone-light: #544840;
      --accent-green: #2ecc71;
      --shadow: rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background-color: #0d0a06;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(139,26,26,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(201,146,42,0.06) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9922a' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      min-height: 100vh;
      color: var(--parchment);
    }

    header {
      text-align: center;
      padding: 32px 20px 20px;
      border-bottom: 1px solid rgba(201,146,42,0.2);
      position: relative;
    }
    header::after {
      content: '⚔ ✦ ⚔';
      display: block;
      font-size: 14px;
      color: var(--gold);
      margin-top: 8px;
      letter-spacing: 12px;
    }

    .header-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(20px, 4vw, 36px);
      font-weight: 900;
      color: var(--gold-bright);
      text-shadow: 0 0 40px rgba(240,180,41,0.4), 0 2px 4px rgba(0,0,0,0.8);
      letter-spacing: 3px;
    }
    .header-sub {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: rgba(201,146,42,0.6);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      border-bottom: 2px solid rgba(201,146,42,0.2);
      padding-bottom: 0;
    }
    .tab-btn {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px 28px;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: rgba(245,230,200,0.4);
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -2px;
    }
    .tab-btn:hover { color: var(--gold); }
    .tab-btn.active {
      color: var(--gold-bright);
      border-bottom-color: var(--gold-bright);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Sections ── */
    .section {
      background: linear-gradient(135deg, rgba(42,35,24,0.95), rgba(26,10,0,0.9));
      border: 1px solid rgba(201,146,42,0.25);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(201,146,42,0.3), transparent);
    }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(201,146,42,0.15);
      border-radius: 4px;
      padding: 20px 16px;
      text-align: center;
    }
    .stat-value {
      font-family: 'Cinzel Decorative', serif;
      font-size: 40px;
      font-weight: 700;
      color: var(--gold-bright);
      line-height: 1;
      text-shadow: 0 0 20px rgba(240,180,41,0.3);
    }
    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(245,230,200,0.4);
      margin-top: 8px;
    }

    /* ── Poll Status ── */
    .poll-status {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 10px 16px;
      border-radius: 3px;
      margin-bottom: 20px;
      text-align: center;
    }
    .poll-status.active {
      background: rgba(139,26,26,0.3);
      border: 1px solid rgba(192,57,43,0.5);
      color: #e74c3c;
    }
    .poll-status.inactive {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(245,230,200,0.1);
      color: rgba(245,230,200,0.3);
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,146,42,0.3);
      border-radius: 3px;
      padding: 12px 16px;
      color: var(--parchment);
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--gold); }
    input[type="text"].error { border-color: var(--crimson-bright); }
    input[type="text"]::placeholder { color: rgba(245,230,200,0.25); }

    .form-group { margin-bottom: 18px; }

    .option-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .option-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 15px;
      color: var(--gold);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .option-row input { margin: 0; }

    .option-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* ── Buttons ── */
    .btn {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 28px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-gold {
      background: linear-gradient(135deg, #c9922a, #f0b429);
      color: var(--ink);
      box-shadow: 0 4px 20px rgba(201,146,42,0.3);
    }
    .btn-gold:not(:disabled):hover {
      background: linear-gradient(135deg, #f0b429, #c9922a);
      box-shadow: 0 4px 30px rgba(201,146,42,0.5);
      transform: translateY(-1px);
    }

    .btn-crimson {
      background: linear-gradient(135deg, #8b1a1a, #c0392b);
      color: var(--parchment);
      box-shadow: 0 4px 20px rgba(139,26,26,0.3);
    }
    .btn-crimson:not(:disabled):hover {
      box-shadow: 0 4px 30px rgba(192,57,43,0.5);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(201,146,42,0.3);
      color: var(--gold);
      font-size: 11px;
      padding: 8px 16px;
    }
    .btn-ghost:hover { background: rgba(201,146,42,0.1); border-color: var(--gold); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    /* ── Poll Results ── */
    .result-question {
      font-family: 'Cinzel', serif;
      font-size: 17px;
      color: var(--parchment);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .result-row {
      margin-bottom: 16px;
    }
    .result-meta {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }
    .result-option-label {
      font-family: 'Cinzel Decorative', serif;
      font-size: 14px;
      color: var(--gold-bright);
      width: 20px;
    }
    .result-option-text {
      font-size: 16px;
      color: var(--parchment);
      flex: 1;
    }
    .result-count {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      color: rgba(245,230,200,0.5);
      letter-spacing: 1px;
    }
    .result-bar-bg {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,146,42,0.15);
      border-radius: 2px;
      height: 10px;
      overflow: hidden;
    }
    .result-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--crimson), var(--gold));
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .result-pct {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold);
      float: right;
      margin-top: 4px;
    }
    .result-total {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(245,230,200,0.35);
      text-align: right;
      text-transform: uppercase;
      margin-top: 16px;
      clear: both;
    }

    .no-poll-msg {
      font-style: italic;
      color: rgba(245,230,200,0.3);
      text-align: center;
      padding: 20px;
      font-size: 16px;
    }

    /* ── QR Tab ── */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 20px 0;
    }
    #qr-code {
      background: var(--parchment);
      padding: 16px;
      border-radius: 4px;
      border: 3px solid var(--gold);
      box-shadow: 0 0 40px rgba(201,146,42,0.3);
    }
    .qr-url {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 14px;
      color: rgba(245,230,200,0.4);
      word-break: break-all;
      text-align: center;
      max-width: 400px;
    }
    .qr-instruction {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
    }

    /* ── Divider ── */
    .ornament {
      text-align: center;
      color: rgba(201,146,42,0.3);
      font-size: 18px;
      letter-spacing: 8px;
      margin: 4px 0 24px;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-title">The Oracle</div>
    <div class="header-sub">Dungeon Master's Sanctum</div>
  </header>

  <div class="container">

    <div class="tabs">
      <button class="tab-btn active" data-panel="panel-control">⚔ Control Panel</button>
      <button class="tab-btn" data-panel="panel-qr">◈ Audience QR</button>
    </div>

    <!-- ── CONTROL PANEL TAB ── -->
    <div class="tab-panel active" id="panel-control">

      <!-- Crowd Stats -->
      <div class="section" id="crowd-stats-section">
        <div class="section-title">Crowd Stats</div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="total-users">0</div>
            <div class="stat-label">Total Joined</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="button-count">0</div>
            <div class="stat-label">Button Pressed</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="ratio">0%</div>
            <div class="stat-label">Press Ratio</div>
          </div>
        </div>
      </div>

      <!-- Poll Results -->
      <div class="section">
        <div class="section-title">Live Results</div>
        <div id="poll-status" class="poll-status inactive">○ No Active Poll</div>
        <div id="poll-results">
          <p class="no-poll-msg">No poll is currently active. Create one below.</p>
        </div>
        <div class="btn-row">
          <button class="btn btn-crimson" id="close-poll-btn" disabled>✕ Close Poll</button>
        </div>
      </div>

      <!-- Create Poll -->
      <div class="section">
        <div class="section-title">Create Poll</div>
        <div class="form-group">
          <label>Question</label>
          <input type="text" id="question-input" placeholder="What do the adventurers do next?" />
        </div>
        <div class="form-group">
          <label>Options</label>
          <div id="options-container"></div>
          <div class="option-controls">
            <button class="btn btn-ghost" id="add-option-btn">+ Add Option</button>
            <button class="btn btn-ghost" id="remove-option-btn">− Remove Option</button>
          </div>
        </div>
        <button class="btn btn-gold" id="send-poll-btn">⚔ Send Poll to Audience</button>
      </div>

    </div>

    <!-- ── QR TAB ── -->
    <div class="tab-panel" id="panel-qr">
      <div class="section">
        <div class="section-title">Audience Screen QR Code</div>
        <div class="qr-wrap">
          <div class="qr-instruction">Have your players scan this to join</div>
          <div id="qr-code"></div>
          <div class="qr-url" id="audience-url"></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
